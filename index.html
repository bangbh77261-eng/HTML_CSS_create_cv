<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dữ liệu Google Sheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07101f;
            --bg2: #0b1929;
            --bg3: #112236;
            --card: rgba(11, 25, 41, 0.95);
            --teal: #00c8da;
            --teal2: #008fa0;
            --gold: #ffc842;
            --green: #00e39e;
            --purple: #b47af0;
            --red: #ff4d70;
            --orange: #ff8d40;
            --t: #daeef6;
            --td: #6e92ab;
            --b: rgba(0, 200, 218, 0.13);
            --bb: rgba(0, 200, 218, 0.28);
            --r: 9px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg);
            color: var(--t);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse 55% 40% at 3% 6%, rgba(0, 200, 218, .07) 0%, transparent 55%),
                radial-gradient(ellipse 40% 50% at 97% 95%, rgba(180, 122, 240, .06) 0%, transparent 55%);
        }

        /* HEADER */
        header {
            position: relative;
            z-index: 10;
            background: linear-gradient(90deg, var(--bg2), var(--bg3));
            border-bottom: 1px solid var(--bb);
            padding: 15px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 23px;
        }

        header h1 {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: -0.3px;
        }

        header h1 em {
            font-style: normal;
            color: var(--teal);
        }

        .hdr-r {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .badge {
            background: rgba(0, 200, 218, .1);
            border: 1px solid var(--bb);
            color: var(--teal);
            font-size: 10px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            letter-spacing: .4px;
        }

        /* MAIN CONTENT */
        .container {
            position: relative;
            z-index: 1;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .table-wrapper {
            background: var(--card);
            border: 1px solid var(--b);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(90deg, var(--bg2), var(--bg3));
            border-bottom: 2px solid var(--bb);
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 700;
            color: var(--teal);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 11px;
        }

        tbody tr {
            border-bottom: 1px solid var(--b);
            transition: all 0.15s;
        }

        tbody tr:hover {
            background: rgba(0, 200, 218, 0.05);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            padding: 12px 15px;
            color: var(--t);
        }

        /* LOADING STATE */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            gap: 10px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--bb);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ERROR STATE */
        .error {
            background: rgba(255, 77, 112, 0.1);
            border: 1px solid var(--red);
            color: #ff9da6;
            padding: 15px;
            border-radius: var(--r);
            margin-top: 20px;
        }

        /* EMPTY STATE */
        .empty {
            padding: 40px;
            text-align: center;
            color: var(--td);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .status-active {
            background: rgba(0, 227, 158, 0.2);
            color: var(--green);
        }

        .status-inactive {
            background: rgba(255, 77, 112, 0.2);
            color: var(--red);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">📊</div>
        <h1>Dữ liệu <em>Google Sheet</em></h1>
        <div class="hdr-r">
            <div class="badge">LIVE</div>
        </div>
    </header>

    <div class="container">
        <div class="table-wrapper">
            <div id="tableContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Đang tải dữ liệu...</span>
                </div>
            </div>
        </div>
        <div id="errorContainer"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDPWyJRfJ6s_MeAc-m8NvDJuZE8JoVvi0SQNZWsuLDOrwtHbqHjnJ2Qf2xWGs2Phr15g/exec';

        async function loadGoogleSheetData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                if (!data || data.length === 0) {
                    showEmpty();
                    return;
                }

                displayTable(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                showError('Lỗi khi tải dữ liệu. Vui lòng kiểm tra URL hoặc thử lại sau.');
            }
        }

        function displayTable(data) {
            const container = document.getElementById('tableContainer');

            // Get headers from first row
            const headers = Object.keys(data[0]);

            // Build table HTML
            let tableHTML = '<table><thead><tr>';
            headers.forEach(header => {
                tableHTML += `<th>${header}</th>`;
            });
            tableHTML += '</tr></thead><tbody>';

            // Add data rows
            data.forEach(row => {
                tableHTML += '<tr>';
                headers.forEach(header => {
                    let value = row[header] || '';
                    // Format specific columns if needed
                    if (header.toLowerCase().includes('status')) {
                        const status = value.toLowerCase();
                        const className = status === 'active' || status === 'hoạt động' ? 'status-active' : 'status-inactive';
                        value = `<span class="status-badge ${className}">${value}</span>`;
                    }
                    tableHTML += `<td>${value}</td>`;
                });
                tableHTML += '</tr>';
            });

            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
        }

        function showEmpty() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="empty">Không có dữ liệu để hiển thị</div>';
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error">❌ ${message}</div>`;

            const tableContainer = document.getElementById('tableContainer');
            tableContainer.innerHTML = '<div class="empty">Không thể tải dữ liệu</div>';
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadGoogleSheetData);
    </script>
</body>

</html>
